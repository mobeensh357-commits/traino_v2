{% extends 'base.html' %}
{% block title %}Forgot Password — Traino{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--grey-100)">
  <div style="background:#fff;border-radius:var(--radius);border:1px solid var(--grey-200);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:420px">

    <!-- Icon -->
    <div style="width:56px;height:56px;border-radius:50%;background:var(--yellow-light);color:var(--yellow-dark);font-size:1.3rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
      <i class="fas fa-key"></i>
    </div>

    <h2 style="font-size:1.35rem;font-weight:800;text-align:center;margin-bottom:.35rem">Forgot Password?</h2>
    <p style="color:var(--grey-500);font-size:.84rem;text-align:center;margin-bottom:1.75rem">
      Enter your registered email and we'll send a 6-digit OTP to reset your password.
    </p>

    <form method="POST" action="{% url 'forgot_password' %}">
      {% csrf_token %}
      <div class="fg">
        <label class="t-label">Email Address</label>
        <input type="email" name="email" class="t-input"
               placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn-y btn-block mt-1" style="padding:.78rem">
        <i class="fas fa-paper-plane"></i> Send OTP
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.82rem;color:var(--grey-500)">
      Remembered it? <a href="{% url 'login' %}" style="color:var(--yellow-dark);font-weight:700">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
