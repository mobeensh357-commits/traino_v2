{% extends 'base.html' %}
{% block title %}Set New Password · Traino{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--grey-100)">
  <div style="background:#fff;border-radius:var(--radius);border:1px solid var(--grey-200);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:440px">
    <div style="width:52px;height:52px;border-radius:50%;background:#FEF3C7;color:#D4A017;font-size:1.2rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
      <i class="fas fa-unlock-alt"></i>
    </div>
    <h2 style="font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.3rem">Reset Password</h2>
    <p style="color:#6b7280;font-size:.83rem;text-align:center;margin-bottom:1.75rem">OTP verified. Choose a strong new password.</p>
    <form method="POST" id="resetForm">
      {% csrf_token %}
      <div class="mb-3">
        <label class="t-label">New Password</label>
        <div class="pw-wrap">
          <input type="password" name="password1" id="id_pw1" class="t-input" placeholder="Min. 8 characters" required>
          <button type="button" class="pw-toggle" onclick="togglePw('id_pw1','eye1')"><i class="fas fa-eye" id="eye1"></i></button>
        </div>
      </div>
      <div class="mb-3">
        <label class="t-label">Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" name="password2" id="id_pw2" class="t-input" placeholder="Repeat new password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('id_pw2','eye2')"><i class="fas fa-eye" id="eye2"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-y btn-block mt-2" style="padding:.78rem">
        <i class="fas fa-check-circle"></i> Reset Password
      </button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:#9ca3af">
      <a href="{% url 'login' %}" class="text-muted">Back to Login</a>
    </p>
  </div>
</div>

<script>
function togglePw(fieldId, eyeId) {
  const field = document.getElementById(fieldId);
  const eye = document.getElementById(eyeId);
  if (field.type === 'password') {
    field.type = 'text';
    eye.classList.remove('fa-eye');
    eye.classList.add('fa-eye-slash');
  } else {
    field.type = 'password';
    eye.classList.remove('fa-eye-slash');
    eye.classList.add('fa-eye');
  }
}
</script>
{% endblock %}
