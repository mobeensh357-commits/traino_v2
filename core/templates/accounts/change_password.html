{% extends 'base.html' %}
{% block title %}Change Password — Traino{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--grey-100)">
  <div style="background:#fff;border-radius:var(--radius);border:1px solid var(--grey-200);box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:440px">
    <div style="width:52px;height:52px;border-radius:50%;background:#FEF3C7;color:#D4A017;font-size:1.2rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
      <i class="fas fa-lock"></i>
    </div>
    <h2 style="font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.3rem">Change Password</h2>
    <p style="color:#6b7280;font-size:.83rem;text-align:center;margin-bottom:1.75rem">Enter your current password then choose a new one.</p>
    <form method="POST" action="{% url 'change_password' %}" id="cpForm">
      {% csrf_token %}
      <div class="fg">
        <label class="t-label">Current Password</label>
        <div class="pw-wrap">
          <input type="password" name="current_password" id="cp1" class="t-input" placeholder="Your current password" required>
          <button type="button" class="pw-toggle" onclick="Traino.togglePw('cp1','cpe1')"><i class="fas fa-eye" id="cpe1"></i></button>
        </div>
      </div>
      <div class="fg">
        <label class="t-label">New Password</label>
        <div class="pw-wrap">
          <input type="password" name="new_password1" id="cp2" class="t-input" placeholder="Min. 8 characters" required oninput="Traino.checkStrength(this.value,'sbar')">
          <button type="button" class="pw-toggle" onclick="Traino.togglePw('cp2','cpe2')"><i class="fas fa-eye" id="cpe2"></i></button>
        </div>
        <div class="strength-bar mt-1" id="sbar"><div class="fill"></div></div>
        <div id="sbar-label" style="font-size:.72rem;color:#9ca3af;margin-top:.15rem;height:.9rem"></div>
      </div>
      <div class="fg">
        <label class="t-label">Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" name="new_password2" id="cp3" class="t-input" placeholder="Repeat new password" required>
          <button type="button" class="pw-toggle" onclick="Traino.togglePw('cp3','cpe3')"><i class="fas fa-eye" id="cpe3"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-y btn-block mt-1" style="padding:.78rem">
        <i class="fas fa-check-circle"></i> Update Password
      </button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:#9ca3af">
      <a href="{% url 'profile' %}" style="color:#D4A017;font-weight:600">Back to Profile</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('cpForm').addEventListener('submit', function(e) {
  var p2 = document.getElementById('cp2').value;
  var p3 = document.getElementById('cp3').value;
  if (p2 !== p3) { e.preventDefault(); alert('New passwords do not match.'); }
});
</script>
{% endblock %}
