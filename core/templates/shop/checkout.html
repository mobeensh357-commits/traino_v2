{% extends 'base.html' %}
{% block title %}Checkout · {{ course.title }}{% endblock %}
{% block content %}
<section class="t-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="t-card">
          <h2 class="mb-4">Checkout</h2>
          <div class="mb-4">
            <h5>{{ course.title }}</h5>
            <p class="text-muted">by {{ course.instructor.get_display_name }}</p>
            <div class="h3 text-warning">Rs {{ course.price }}</div>
          </div>
          
          <form method="POST" action="{% url 'shop:checkout' course.pk %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="t-label">Card Number (demo)</label>
              <input type="text" name="card_number" class="t-input" placeholder="4242 4242 4242 4242" required>
              <div class="small text-muted mt-1">Dummy payment: any 16-digit number works.</div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-6">
                <label class="t-label">Expiry</label>
                <input type="text" class="t-input" placeholder="MM/YY">
              </div>
              <div class="col-6">
                <label class="t-label">CVV</label>
                <input type="text" class="t-input" placeholder="123">
              </div>
            </div>
            <button type="submit" class="btn-y w-100 py-2">
              <i class="fas fa-lock me-2"></i> Pay Rs {{ course.price }}
            </button>
          </form>
          <div class="mt-3 text-center">
            <a href="{% url 'course_detail' course.pk %}" class="text-muted">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
